name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.21, 1.22]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Set up Go module cache
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go-version }}-
    
    - name: Download dependencies
      run: |
        go mod download
        go mod verify
    
    - name: Run go vet
      run: go vet ./...
    
    - name: Check formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Code is not formatted. Run 'make fmt' to fix."
          gofmt -l .
          exit 1
        fi
    
    - name: Run tests with race detection
      run: go test -race -coverprofile=coverage.out ./...
    
    - name: Run integration tests
      run: go test -race ./test/...
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
      if: matrix.go-version == '1.21'  # Only upload coverage once

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.21
    
    - name: Build main binary
      run: make build
    
    - name: Test build-all target
      run: make build-all
      if: startsWith(github.ref, 'refs/tags/')  # Only build all platforms on tags
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cert-monitor-binaries
        path: build/
      if: startsWith(github.ref, 'refs/tags/')

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.21
    
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        args: --timeout=5m

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.21
    
    - name: Download and install Gosec
      run: |
        curl -sfL https://raw.githubusercontent.com/securecodewarrior/gosec/master/install.sh | sh -s -- -b $(go env GOPATH)/bin latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
    
    - name: Run Gosec Security Scanner
      run: |
        # Run gosec and create SARIF output (don't fail on findings)
        gosec -fmt sarif -out gosec-results.sarif ./... || true
        # Also run with normal output for console logs
        echo "Gosec security scan results:"
        gosec ./... || echo "Gosec completed with findings or warnings"
    
    - name: Check if SARIF file exists
      id: check-sarif
      run: |
        if [ -f "gosec-results.sarif" ]; then
          echo "sarif-exists=true" >> $GITHUB_OUTPUT
          echo "SARIF file created successfully"
          cat gosec-results.sarif
        else
          echo "sarif-exists=false" >> $GITHUB_OUTPUT
          echo "SARIF file was not created"
        fi
    
    - name: Upload Gosec results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always() && steps.check-sarif.outputs.sarif-exists == 'true'
      with:
        sarif_file: gosec-results.sarif

